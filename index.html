<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Météo Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 1.8rem; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
  .search-bar {
    display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .search-bar input {
    flex: 1; min-width: 200px; padding: 10px 14px; border-radius: 10px;
    border: 1px solid #334155; background: #1e293b; color: #e2e8f0;
    font-size: 1rem; outline: none; transition: border .2s;
  }
  .search-bar input:focus { border-color: #3b82f6; }
  .search-bar button, .location-btn {
    padding: 10px 20px; border-radius: 10px; border: none;
    background: #3b82f6; color: #fff; font-size: 1rem;
    cursor: pointer; transition: background .2s;
  }
  .search-bar button:hover, .location-btn:hover { background: #2563eb; }
  .location-btn { background: #334155; }
  .location-btn:hover { background: #475569; }
  .city-select { display: none; }
  .city-select.show { display: block; }
  .city-select select {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    border: 1px solid #334155; background: #1e293b; color: #e2e8f0;
    font-size: 1rem; margin-bottom: 20px; outline: none;
  }
  .current-weather {
    background: linear-gradient(135deg, #1e3a5f, #1e293b);
    border-radius: 16px; padding: 24px; margin-bottom: 24px;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 16px; border: 1px solid #334155;
  }
  .current-weather .city-name {
    grid-column: 1 / -1; font-size: 1.3rem; font-weight: 600; margin-bottom: 4px;
  }
  .metric {
    background: rgba(255,255,255,.05); border-radius: 12px;
    padding: 14px; text-align: center;
  }
  .metric .label { font-size: .75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; }
  .metric .value { font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
  .metric .icon { font-size: 1.3rem; }
  .condition-badge {
    grid-column: 1 / -1; text-align: center; font-size: 1.1rem;
    padding: 8px; background: rgba(255,255,255,.05); border-radius: 10px;
  }
  .tip-card {
    background: linear-gradient(135deg, #1e3a5f, #1e293b);
    border: 1px solid #3b82f6; border-radius: 12px;
    padding: 14px 18px; margin-bottom: 20px; font-size: 1rem;
    display: flex; align-items: center; gap: 10px;
  }
  .tip-card .icon { font-size: 1.5rem; }
  .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; margin-top: 24px; }
  .daily-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 8px; margin-bottom: 24px;
  }
  .daily-card {
    background: #1e293b; border-radius: 12px; padding: 12px 8px;
    text-align: center; border: 1px solid #334155;
  }
  .daily-card .day { font-size: .85rem; color: #94a3b8; }
  .daily-card .temp { font-size: 1.1rem; font-weight: 600; margin: 4px 0; }
  .daily-card .temp span { color: #94a3b8; font-weight: 400; }
  .daily-card .extra { font-size: .75rem; color: #64748b; }
  .chart-wrapper {
    background: #1e293b; border-radius: 12px; padding: 16px;
    border: 1px solid #334155; margin-bottom: 24px;
  }
  .chart-wrapper canvas { width: 100% !important; max-height: 300px; }
  .table-wrapper {
    background: #1e293b; border-radius: 12px; overflow: hidden;
    border: 1px solid #334155; margin-bottom: 24px;
  }
  .table-wrapper summary {
    padding: 12px 16px; cursor: pointer; font-weight: 600;
    color: #94a3b8; user-select: none;
  }
  .table-wrapper summary:hover { color: #e2e8f0; }
  .table-scroll { overflow-x: auto; max-height: 400px; overflow-y: auto; display: none; }
  .table-wrapper[open] .table-scroll { display: block; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th { background: #0f172a; color: #94a3b8; padding: 8px 10px; text-align: left; position: sticky; top: 0; white-space: nowrap; }
  td { padding: 6px 10px; border-top: 1px solid #334155; white-space: nowrap; }
  .loading {
    text-align: center; padding: 40px; color: #64748b;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid #334155;
    border-top-color: #3b82f6; border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #f87171; text-align: center; padding: 20px; }
  footer { text-align: center; color: #475569; font-size: .8rem; margin-top: 32px; }
  footer a { color: #64748b; }
  @media (max-width: 600px) {
    .current-weather { grid-template-columns: repeat(2, 1fr); }
    .daily-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🌤 Météo Dashboard</h1>

  <div class="search-bar">
    <input type="text" id="cityInput" placeholder="Nom de la ville..." value="Marseille" autofocus>
    <button onclick="searchCity()">Rechercher</button>
    <button class="location-btn" onclick="getLocation()">📍 Ma position</button>
  </div>

  <div class="city-select" id="citySelect">
    <select id="cityDropdown" onchange="selectCity()"></select>
  </div>

  <div id="weatherDisplay">
    <div class="loading"><div class="spinner"></div>Chargement...</div>
  </div>

  <footer>
    Données via <a href="https://open-meteo.com" target="_blank">Open-Meteo</a>
  </footer>
</div>

<script>
const GEO_URL = "https://geocoding-api.open-meteo.com/v1/search";
const FORECAST_URL = "https://api.open-meteo.com/v1/forecast";

const WMO = {
  0:"☀️ Ciel dégagé",1:"🌤 Partiellement nuageux",2:"⛅ Nuageux",
  3:"☁️ Couvert",45:"🌫 Brouillard",48:"🌫 Brouillard givrant",
  51:"🌦 Bruine légère",53:"🌦 Bruine modérée",55:"🌦 Bruine dense",
  56:"🌧 Bruine verglaçante légère",57:"🌧 Bruine verglaçante dense",
  61:"🌧 Pluie légère",63:"🌧 Pluie modérée",65:"🌧 Pluie forte",
  66:"🌨 Pluie verglaçante légère",67:"🌨 Pluie verglaçante forte",
  71:"❄️ Neige légère",73:"❄️ Neige modérée",75:"❄️ Neige forte",
  77:"🧊 Grésil",80:"🌦 Averses légères",81:"🌦 Averses modérées",
  82:"🌦 Averses violentes",85:"❄️ Averses de neige légères",
  86:"❄️ Averses de neige fortes",95:"⛈ Orage",
  96:"⛈ Orage avec grêle légère",99:"⛈ Orage avec grêle forte",
};

let chartInstance = null;

function getWeatherIcon(code) {
  if (code === 0) return "☀️";
  if (code <= 2) return "⛅";
  if (code === 3) return "☁️";
  if (code >= 45 && code <= 48) return "🌫";
  if (code >= 51 && code <= 57) return "🌦";
  if (code >= 61 && code <= 67) return "🌧";
  if (code >= 71 && code <= 77) return "❄️";
  if (code >= 80 && code <= 86) return "🌦";
  if (code >= 95) return "⛈";
  return "🌤";
}

function getWeatherTip(d) {
  const next = 1;
  const rain = d.precipitation_sum[next];
  const rainProb = d.precipitation_probability_max[next];
  const wc = d.weather_code[next];
  const tMax = d.temperature_2m_max[next];
  const wind = d.wind_speed_10m_max[next];

  if (wc >= 71 && wc <= 77) return { icon: "❄️", text: "Neige prévue demain, prudence sur les routes" };
  if (wc >= 95) return { icon: "⛈️", text: "Orages annoncés demain, reste à l'abri si possible" };
  if (rain > 5) return { icon: "☔", text: "Pluie abondante demain, n'oublie pas ton parapluie" };
  if (rain > 0) return { icon: "🌂", text: "Quelques gouttes demain, prévois un parapluie au cas où" };
  if (rainProb >= 60) return { icon: "☂️", text: "Risque de pluie demain, mieux vaut prendre un parapluie" };
  if (tMax >= 35) return { icon: "🥵", text: "Grosse chaleur demain, reste hydraté et évite le soleil aux heures chaudes" };
  if (tMax >= 30) return { icon: "🧴", text: "Forte chaleur demain, mets de la crème solaire et bois de l'eau" };
  if (tMax <= 0) return { icon: "🧣", text: "Gel prévu demain, couvre-toi bien et attention aux surfaces glissantes" };
  if (tMax <= 5) return { icon: "🧥", text: "Température fraîche demain, prends un manteau" };
  if (wind >= 60) return { icon: "🌬️", text: "Vent violent demain, attention aux objets non fixés" };
  if (wind >= 40) return { icon: "💨", text: "Vent assez fort demain, prudence si tu fais du vélo" };
  return { icon: "✅", text: "Bonne météo demain, profite de ta journée" };
}

function searchCity() {
  const city = document.getElementById("cityInput").value.trim();
  if (!city) return;
  document.getElementById("weatherDisplay").innerHTML =
    '<div class="loading"><div class="spinner"></div>Recherche...</div>';

  fetch(`${GEO_URL}?name=${encodeURIComponent(city)}&count=5&language=fr`)
    .then(r => r.json())
    .then(data => {
      if (!data.results || data.results.length === 0) {
        document.getElementById("weatherDisplay").innerHTML =
          '<div class="error">Ville introuvable</div>';
        return;
      }
      const select = document.getElementById("cityDropdown");
      select.innerHTML = data.results.map((r, i) =>
        `<option value="${i}">${r.name}${r.admin1 ? ', '+r.admin1 : ''}, ${r.country}</option>`
      ).join("");
      window._cityResults = data.results;
      document.getElementById("citySelect").classList.add("show");
      selectCity();
    })
    .catch(() => {
      document.getElementById("weatherDisplay").innerHTML =
        '<div class="error">Erreur de recherche</div>';
    });
}

function selectCity() {
  const idx = document.getElementById("cityDropdown").value;
  const r = window._cityResults[idx];
  if (r) fetchWeather(r.latitude, r.longitude, r.name);
}

function getLocation() {
  if (!navigator.geolocation) {
    document.getElementById("weatherDisplay").innerHTML =
      '<div class="error">Géolocalisation non supportée</div>';
    return;
  }
  document.getElementById("weatherDisplay").innerHTML =
    '<div class="loading"><div class="spinner"></div>Position...</div>';
  navigator.geolocation.getCurrentPosition(
    pos => fetchWeather(pos.coords.latitude, pos.coords.longitude, "Ma position"),
    () => {
      document.getElementById("weatherDisplay").innerHTML =
        '<div class="error">Impossible d\'obtenir la position</div>';
    }
  );
}

function fetchWeather(lat, lon, name) {
  const params = new URLSearchParams({
    latitude: lat, longitude: lon,
    current: "temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,pressure_msl",
    hourly: "temperature_2m,precipitation_probability,precipitation,weather_code,wind_speed_10m,relative_humidity_2m,apparent_temperature,uv_index",
    daily: "temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,weather_code",
    timezone: "auto", forecast_days: "7",
  });

  fetch(`${FORECAST_URL}?${params}`)
    .then(r => r.json())
    .then(data => renderWeather(data, name))
    .catch(() => {
      document.getElementById("weatherDisplay").innerHTML =
        '<div class="error">Erreur API météo</div>';
    });
}

function renderWeather(data, name) {
  const c = data.current;
  const d = data.daily;
  const h = data.hourly;
  const wc = c.weather_code ?? 0;

  let html = `
    <div class="current-weather">
      <div class="city-name">${getWeatherIcon(wc)} ${escapeHtml(name)}</div>
      <div class="metric"><div class="label">Température</div><div class="value">${c.temperature_2m.toFixed(1)}°C</div></div>
      <div class="metric"><div class="label">Ressenti</div><div class="value">${c.apparent_temperature.toFixed(1)}°C</div></div>
      <div class="metric"><div class="label">Humidité</div><div class="value">${c.relative_humidity_2m}%</div></div>
      <div class="metric"><div class="label">Vent</div><div class="value">${c.wind_speed_10m.toFixed(1)} km/h</div></div>
      <div class="metric"><div class="label">Précipitations</div><div class="value">${c.precipitation ?? 0} mm</div></div>
      <div class="metric"><div class="label">Pression</div><div class="value">${c.pressure_msl.toFixed(0)} hPa</div></div>
      <div class="condition-badge">${WMO[wc] || 'Code ' + wc}</div>
    </div>`;

  const tip = getWeatherTip(d);
  html += `<div class="tip-card"><span class="icon">${tip.icon}</span> ${tip.text}</div>`;

  html += `<div class="section-title">📅 Prévisions sur 7 jours</div><div class="daily-grid">`;
  for (let i = 0; i < d.time.length; i++) {
    const date = new Date(d.time[i] + "T12:00:00");
    const day = date.toLocaleDateString("fr-FR", { weekday: "short", day: "numeric", month: "short" });
    html += `
      <div class="daily-card">
        <div class="day">${day}</div>
        <div class="temp">${d.temperature_2m_max[i].toFixed(0)}° <span>${d.temperature_2m_min[i].toFixed(0)}°</span></div>
        <div class="extra">💧 ${d.precipitation_sum[i].toFixed(1)} mm</div>
        <div class="extra">💨 ${d.wind_speed_10m_max[i].toFixed(0)} km/h</div>
      </div>`;
  }
  html += `</div>`;

  html += `<div class="section-title">⏳ Température & risque pluie (48h)</div>
    <div class="chart-wrapper"><canvas id="hourlyChart"></canvas></div>`;

  html += `<details class="table-wrapper">
    <summary>📊 Voir le tableau horaire complet</summary>
    <div class="table-scroll">
    <table><thead><tr>
      <th>Heure</th><th>Température</th><th>Ressenti</th><th>Pluie (mm)</th>
      <th>Risque (%)</th><th>Vent (km/h)</th><th>Humidité (%)</th><th>UV</th>
    </tr></thead><tbody>`;

  const hours = Math.min(48, h.time.length);
  for (let i = 0; i < hours; i++) {
    const date = new Date(h.time[i] + "Z");
    const timeStr = date.toLocaleDateString("fr-FR", { weekday: "short" }) + " " +
                    date.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
    html += `<tr>
      <td>${timeStr}</td>
      <td>${h.temperature_2m[i].toFixed(1)}°C</td>
      <td>${h.apparent_temperature[i].toFixed(1)}°C</td>
      <td>${(h.precipitation[i] ?? 0).toFixed(1)}</td>
      <td>${h.precipitation_probability[i]}%</td>
      <td>${h.wind_speed_10m[i].toFixed(1)}</td>
      <td>${h.relative_humidity_2m[i]}%</td>
      <td>${h.uv_index[i].toFixed(1)}</td>
    </tr>`;
  }
  html += `</tbody></table></div></details>`;

  document.getElementById("weatherDisplay").innerHTML = html;
  buildChart(h, hours);
}

function buildChart(h, hours) {
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const labels = [];
  const temps = [];
  const feels = [];
  const rain = [];

  for (let i = 0; i < hours; i++) {
    const date = new Date(h.time[i] + "Z");
    labels.push(date.toLocaleDateString("fr-FR", { weekday: "short" }) + " " +
                date.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }));
    temps.push(h.temperature_2m[i]);
    feels.push(h.apparent_temperature[i]);
    rain.push(h.precipitation_probability[i]);
  }

  const ctx = document.getElementById("hourlyChart").getContext("2d");
  chartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: "Température",
          data: temps,
          borderColor: "#f59e0b",
          backgroundColor: "rgba(245,158,11,.1)",
          fill: true,
          tension: .3,
          pointRadius: 2,
          yAxisID: "y",
        },
        {
          label: "Ressenti",
          data: feels,
          borderColor: "#ef4444",
          borderDash: [5,5],
          tension: .3,
          pointRadius: 2,
          yAxisID: "y",
        },
        {
          label: "Risque pluie",
          data: rain,
          type: "bar",
          backgroundColor: "rgba(59,130,246,.25)",
          borderColor: "rgba(59,130,246,.5)",
          borderWidth: 1,
          borderRadius: 2,
          yAxisID: "y1",
          order: 2,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { labels: { color: "#94a3b8", boxWidth: 12, padding: 12 } },
      },
      scales: {
        x: {
          ticks: { color: "#64748b", maxTicksLimit: 12, font: { size: 10 } },
          grid: { color: "rgba(51,65,85,.5)" },
        },
        y: {
          position: "left",
          title: { display: true, text: "°C", color: "#94a3b8" },
          ticks: { color: "#64748b" },
          grid: { color: "rgba(51,65,85,.5)" },
        },
        y1: {
          position: "right",
          title: { display: true, text: "%", color: "#94a3b8" },
          min: 0, max: 100,
          ticks: { color: "#64748b" },
          grid: { display: false },
        },
      },
    },
  });
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

searchCity();
document.getElementById("cityInput").addEventListener("keydown", e => {
  if (e.key === "Enter") searchCity();
});
</script>
</body>
</html>
